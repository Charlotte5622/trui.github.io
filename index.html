<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="yixin0313" />
    <title id="title"></title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap"
        rel="stylesheet" />

    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script"
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>
</head>

<body id="page-top">
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container page-shell">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#home">Homepage</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#publications">Research Outputs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#awards">Undergraduate</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#experience">Ph.D.</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="site-main">
        <div class="container page-shell page-layout">
            <aside class="profile-sidebar">
                <div class="profile-card">
                    <img class="profile-avatar shadow" src="static/assets/img/photo.png" alt="Tongrui Zhang">
                    <h1 class="profile-name" id="sidebar-name"></h1>
                    <p class="profile-affiliation" id="sidebar-affiliation"></p>
                    <ul class="profile-links">
                        <li><i class="bi bi-geo-alt-fill"></i><span id="sidebar-location"></span></li>
                        <li><i class="bi bi-envelope-fill"></i><a id="sidebar-email-link" href="#"><span
                                    id="sidebar-email"></span></a></li>
                        <li><i class="bi bi-github"></i><a id="sidebar-github-link" href="#" target="_blank"
                                rel="noreferrer"><span id="sidebar-github"></span></a></li>
                    </ul>
                </div>
            </aside>

            <div class="content-column">
                <section class="content-section intro-section" id="home">
                    <div class="main-body" id="home-md"></div>
                </section>

                <section class="content-section" id="publications">
                    <header class="section-heading">
                        <h2><i class="bi bi-pencil-square"></i> Research Outputs</h2>
                    </header>
                    <div class="main-body" id="publications-md"></div>
                </section>

                <section class="content-section" id="awards">

                        <h2><i class="bi bi-mortarboard-fill"></i> Undergraduate</h2>

                    <div class="main-body" id="awards-md"></div>
                </section>

                <section class="content-section" id="experience">
                    <header class="section-heading">
                        <h2><i class="bi bi-hourglass-split"></i> Ph.D. Stage</h2>
                    </header>
                    <div class="main-body" id="experience-md"></div>
                </section>
            </div>
        </div>
    </main>

    <footer class="bg-bottom text-center py-4">
        <div class="container page-shell">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>
</body>

</html>
